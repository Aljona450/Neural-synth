<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Neural-Synth Controls</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; background: #ffb6c1; font-family: sans-serif; }
        .controls { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 5px; }
        button { padding: 10px; cursor: pointer; background: white; border: 1px solid #d87093; border-radius: 5px; color: #d87093; }
    </style>
</head>
<body>
    <div class="controls">
        <button onclick="testFeature('pitch')">1. Pitch-on-Y</button>
        <button onclick="testFeature('color')">2. Color-Instrument</button>
        <button onclick="testFeature('clear')">Clear Canvas</button>
    </div>

<script>
    let osc, started = false;
    let mode = '';

    function setup() {
        createCanvas(windowWidth, windowHeight);
        background(255, 182, 193);
    }

    function draw() {
        if (mode === 'color') {
            stroke(map(mouseX, 0, width, 0, 360), 100, 100);
            strokeWeight(5);
            if (mouseIsPressed) line(pmouseX, pmouseY, mouseX, mouseY);
        } else {
            fill(255);
            ellipse(mouseX, mouseY, 20, 20);
        }
    }

    function testFeature(feature) {
        mode = feature;
        if (feature === 'pitch' && !started) {
            osc = new p5.Oscillator('sine');
            osc.start();
            started = true;
        }
        if (feature === 'clear') background(255, 182, 193);
    }

    function mouseMoved() {
        if (mode === 'pitch' && started) {
            let freq = map(mouseY, height, 0, 100, 800);
            osc.freq(freq);
        }
    }
</script>
</body>
</html>
